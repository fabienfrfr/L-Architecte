name: CI-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Cleanup)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost"
          sudo docker image prune -af

      - name: Install Devbox
        uses: jetpack-io/devbox-install-action@v0.11.0

      - name: Setup Infrastructure (Devbox + K3D)
        run: devbox run set

      - name: Build and Deploy with Skaffold
        run: devbox run skaffold run

      - name: Run Integration Tests
        run: devbox run test-ci

      - name: Debug on Failure
        if: failure()
        run: devbox run debug-ci