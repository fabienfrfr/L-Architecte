name: CI-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install K3D and Deploy
        run: bash infra/k3d-deploy.sh

      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/architect -n agentic-architect

      - name: Run Pytest
        run: |
          kubectl exec -n agentic-architect deployments/architect -- pytest tests/