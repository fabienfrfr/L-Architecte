name: CI-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Services
        run: docker compose -f infra/services/docker-compose.yml up -d --build --wait

      - name: Run Tests inside Container
        run: |
          docker compose -f infra/services/docker-compose.yml exec -T \
          -e OLLAMA_URL=http://ollama_service:11434 \
          -e PHOENIX_HOST=phoenix_service \
          architect pytest tests/
