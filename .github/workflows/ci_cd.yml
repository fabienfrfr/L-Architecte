name: CI-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install K3D and Deploy
        run: bash infra/k3d-deploy.sh

      - name: Infrastructure Status
        run: |
          kubectl get pods -n agentic-architect -o wide
          kubectl get svc -n agentic-architect

      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=Ready pod -l app=ollama -n agentic-architect --timeout=600s
          kubectl wait --for=condition=Ready pod -l app=architect -n agentic-architect --timeout=300s

      - name: Debug Infrastructure
        run: |
          echo "--- Models present ---"
          kubectl exec -n agentic-architect deployments/ollama -- ollama list
          echo "--- Pods status ---"
          kubectl get pods -n agentic-architect

      - name: Run Pytest
        run: |
          kubectl exec -n agentic-architect deployments/architect -- pytest tests/