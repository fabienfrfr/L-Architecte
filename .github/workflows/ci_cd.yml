name: CI-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install K3D and Deploy
        run: bash infra/k3d-deploy.sh

      - name: Infrastructure Status (Debug)
        run: |
          echo "Current disk usage after deployment:"
          df -h
          kubectl get pods -n agentic-architect -o wide
          kubectl get svc -n agentic-architect
          kubectl get events -n agentic-architect --sort-by='.lastTimestamp' | tail -n 10
          kubectl describe pod -l app=ollama -n agentic-architect
          kubectl describe pod -l app=architect -n agentic-architect

      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=Ready pod -l app=ollama -n agentic-architect --timeout=600s
          kubectl wait --for=condition=Ready pod -l app=architect -n agentic-architect --timeout=300s
          kubectl exec -n agentic-architect deployments/ollama -- ollama list

      - name: Run Pytest
        run: |
          kubectl exec -n agentic-architect deployments/architect -- pytest tests/
