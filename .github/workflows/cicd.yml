name: CICD-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Deep Cleanup)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune -af
          sudo rm -rf /usr/local/bin/aliyun
          sudo rm -rf /usr/local/bin/azcopy
          df -h

      - name: Install Devbox
        uses: jetpack-io/devbox-install-action@v0.11.0

      - name: Setup Infrastructure (Devbox + k3d)
        run: devbox run set

      - name: Build and k3d Deploy with Skaffold
        run: devbox run skaffold run

      - name: Run Integration Tests
        run: devbox run test-ci

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish Artifacts to GHCR
        if: github.ref == 'refs/heads/main' && success()
        run: |
          export SKAFFOLD_DEFAULT_REPO=ghcr.io/${{ github.repository_owner }}
          
          # Build & Push with SHA tag (Skaffold)
          devbox run skaffold build --push=true --file-output=build.json
          
          # Tag & Push to :latest (Docker + jq)
          jq -r '.builds[] | .tag' build.json | xargs -I {} sh -c '
            TAG_LATEST=$(echo {} | cut -d: -f1):latest
            docker tag {} $TAG_LATEST && docker push $TAG_LATEST
          '

      - name: Fetch Kubeconfig and Deploy
        if: github.ref == 'refs/heads/main' && success()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Setup SSH agent to connect to VPS
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H thearchitect.dev >> ~/.ssh/known_hosts

          # 2. Fetch the fresh Kubeconfig directly from VPS
          # We use sed to replace 127.0.0.1 with the actual domain on the fly
          ssh ubuntu@thearchitect.dev "sudo cat /etc/rancher/k3s/k3s.yaml" | \
          sed "s/127.0.0.1/thearchitect.dev/g" > ~/.kube/config
          chmod 600 ~/.kube/config

          # 3. Deploy your two images
          IMAGE_ARCHITECT="ghcr.io/${{ github.repository_owner }}/agentic-architect:latest"
          devbox run kubectl set image deployment/architect agentic-architect=$IMAGE_ARCHITECT -n agentic-architect
          
          # 4. Final Restart
          devbox run kubectl rollout restart deployment -n agentic-architect

      - name: Debug on Failure
        if: failure()
        run: devbox run debug-ci