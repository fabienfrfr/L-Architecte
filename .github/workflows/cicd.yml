name: CICD-Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Cleanup)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune -af
          df -h

      - name: Install Devbox
        uses: jetpack-io/devbox-install-action@v0.11.0

      - name: Setup Infrastructure (Devbox + k3d)
        run: devbox run set

      - name: Build and k3d Deploy with Skaffold
        run: devbox run skaffold run

      - name: Run Integration Tests
        run: devbox run test-ci

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish Artifacts to GHCR
        if: github.ref == 'refs/heads/main' && success()
        run: |
          export SKAFFOLD_DEFAULT_REPO=ghcr.io/${{ github.repository_owner }}
          
          # Build & Push with SHA tag (Skaffold)
          devbox run skaffold build --push=true --file-output=build.json
          
          # Tag & Push to :latest (Docker + jq)
          jq -r '.builds[] | .tag' build.json | xargs -I {} sh -c '
            TAG_LATEST=$(echo {} | cut -d: -f1):latest
            docker tag {} $TAG_LATEST && docker push $TAG_LATEST
          '

      - name: Deploy Infrastructure (pulumi + k3s) & App
        if: github.ref == 'refs/heads/main' && success()
        continue-on-error: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          OVH_ENDPOINT: ${{ secrets.OVH_ENDPOINT }}
          OVH_APPLICATION_KEY: ${{ secrets.OVH_APPLICATION_KEY }}
          OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
        run: |
          if [ "${{ secrets.PULUMI_ACCESS_TOKEN }}" == "" ]; then
            echo "### ⚠️ Skipping Deployment: Secrets are not configured." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          devbox run pulumi config set --secret kubeconfig "${{ secrets.KUBECONFIG_VPS }}" -C infra
          devbox run infra-up

      - name: Debug on Failure
        if: failure()
        run: devbox run debug-ci