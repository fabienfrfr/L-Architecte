apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: agentic-architect
build:
  local:
    push: false
  artifacts:
    - image: agentic-architect-local
      context: .
      docker:
        dockerfile: apps/architect/Dockerfile
      sync:
        manual:
          - src: "apps/architect/**/*.py"
            dest: .
    - image: custom-ollama-gemma
      context: .
      docker:
        dockerfile: infra/Ollama.Dockerfile

manifests:
  rawYaml:
    - infra/k8s-manifests.yaml

deploy:
  kubectl: {}

portForward:
  - resourceType: service
    resourceName: architect-service
    namespace: agentic-architect
    port: 8080
    localPort: 8080