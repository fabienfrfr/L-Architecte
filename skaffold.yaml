apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: agentic-architect
build:
  local:
    push: false
  artifacts:
    - image: agentic-architect
      context: .
      docker:
        dockerfile: apps/architect/Dockerfile
      sync:
        manual:
          - src: "apps/architect/**/*.py"
            dest: .
    - image: custom-ollama-gemma
      context: .
      docker:
        dockerfile: infra/Ollama.Dockerfile

manifests:
  rawYaml:
    - infra/k8s-manifests.yaml

deploy:
  kubectl: {}

portForward:
  # NiceGUI
  - resourceType: service
    resourceName: architect-service
    namespace: agentic-architect
    port: 8080
    localPort: 8080
  # Observability
  - resourceType: service
    resourceName: phoenix
    namespace: agentic-architect
    port: 6006
    localPort: 6006
  # Remote dev (Interactive)
  - resourceType: service
    resourceName: architect
    port: 2718
    localPort: 2718