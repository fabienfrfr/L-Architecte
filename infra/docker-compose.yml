services:
  traefik:
    image: traefik:v2.10
    profiles: ["deploy"]
    container_name: traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=fabien.furfaro@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    restart: always

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix_service
    ports:
      - "6006:6006"
      - "4317:4317"
      - "4318:4318"
    restart: always

  ollama:
    build:
      context: .
      dockerfile: Ollama.Dockerfile
    container_name: ollama_service
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "show", "gemma3:270m"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  architect:
    build:
      context: ../
      dockerfile: apps/architect/Dockerfile
    container_name: agentic_architect
    working_dir: /app
    user: "1000:1000"
    environment:
      - ENV=test
      - OLLAMA_URL=http://ollama:11434
      - PHOENIX_PORT=6006
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:4317
      - PHOENIX_CLIENT_HEADERS=api_key=unused
      - PYTHONPATH=/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.architect.rule=Host(`thearchitect.dev`)"
      - "traefik.http.routers.architect.entrypoints=websecure"
      - "traefik.http.routers.architect.tls.certresolver=myresolver"
      - "traefik.http.services.architect.loadbalancer.server.port=8080"
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_healthy
      phoenix:
        condition: service_started
    cap_add:
      - SYS_PTRACE
    volumes:
      - ../:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  ollama_data:
