# ==============================================================================
# Kubernetes Manifests for AgenticArchitect Stack
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: agentic-architect
---
# --- 1. OLLAMA SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: agentic-architect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: custom-ollama-gemma
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 15
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agentic-architect
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
---
# --- 2. ARIZE PHOENIX ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: agentic-architect
spec:
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          env:
            - name: PHOENIX_PORT
              value: "6006"
            - name: PHOENIX_HOST
              value: "0.0.0.0"
          ports:
            - containerPort: 6006
            - containerPort: 4317
          readinessProbe:
            httpGet:
              path: /
              port: 6006
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "1Gi"
              cpu: "0.5"
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: agentic-architect
spec:
  selector:
    app: phoenix
  ports:
    - name: ui
      port: 6006
      targetPort: 6006
    - name: grpc
      port: 4317
      targetPort: 4317
---
# --- 3. THE ARCHITECT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect
  namespace: agentic-architect
spec:
  selector:
    matchLabels:
      app: architect
  template:
    metadata:
      labels:
        app: architect
    spec:
      containers:
        - name: agentic-architect
          image: agentic-architect
          imagePullPolicy: IfNotPresent
          workingDir: /app
          env:
            - name: ENV
              value: "test"
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: PHOENIX_URL
              value: "http://phoenix:6006"
            - name: PHOENIX_COLLECTOR_ENDPOINT
              value: "http://phoenix:4317"
            - name: PYTHONPATH
              value: "/app"
          securityContext:
            capabilities:
              add: ["SYS_PTRACE"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: architect-service
  namespace: agentic-architect
spec:
  selector:
    app: architect
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080