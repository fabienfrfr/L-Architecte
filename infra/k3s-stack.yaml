# --- Infrastructure Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: agentic-architect
---
# --- 1. PERSISTENT STORAGE (Ollama Models) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data-pvc
  namespace: agentic-architect
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# --- 2. OLLAMA SERVICE (The AI Engine) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: agentic-architect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest # Use official image for k3s
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: data
          mountPath: /root/.ollama
        # Automatic download of gemma3:270m on start
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "ollama run gemma3:270m"]
        readinessProbe:
          exec:
            command: ["ollama", "list"]
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ollama-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agentic-architect
spec:
  selector:
    app: ollama
  ports:
  - protocol: TCP
    port: 11434
    targetPort: 11434
---
# --- 3. ARIZE PHOENIX (Observability) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: agentic-architect
spec:
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
      - name: phoenix
        image: arizephoenix/phoenix:latest
        ports:
        - containerPort: 6006
        - containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: agentic-architect
spec:
  selector:
    app: phoenix
  ports:
  - name: ui
    port: 6006
    targetPort: 6006
  - name: grpc
    port: 4317
    targetPort: 4317
---
# --- 4. THE ARCHITECT (Core Application) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect
  namespace: agentic-architect
spec:
  selector:
    matchLabels:
      app: architect
  template:
    metadata:
      labels:
        app: architect
    spec:
      containers:
      - name: agentic-architect
        image: agentic-architect-local:latest
        imagePullPolicy: IfNotPresent # Required for local k3d images
        workingDir: /app
        env:
        - name: ENV
          value: "production"
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: PHOENIX_COLLECTOR_ENDPOINT
          value: "http://phoenix:4317"
        securityContext:
          capabilities:
            add: ["SYS_PTRACE"]
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: architect-service
  namespace: agentic-architect
spec:
  type: ClusterIP
  selector:
    app: architect
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
# --- 5. INGRESS CONTROLLER (Routing) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: architect-ingress
  namespace: agentic-architect
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: thearchitect.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: architect-service
            port:
              number: 8080