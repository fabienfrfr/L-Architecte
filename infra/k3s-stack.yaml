# --- Infrastructure Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: agentic-architect
---
# --- 1. PERSISTENT STORAGE (Ollama Models) ---
# Ensures LLM weights (Gemma 270m) persist across pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data-pvc
  namespace: agentic-architect
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi # Adjust based on expected model sizes
---
# --- 2. OLLAMA SERVICE (The AI Engine) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: agentic-architect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama-local:latest # Vendor-agnostic local image
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: data
          mountPath: /root/.ollama
        # Healthcheck: Ensures Gemma model is loaded before accepting traffic
        readinessProbe:
          exec:
            command: ["ollama", "show", "gemma3:270m"]
          initialDelaySeconds: 10
          periodSeconds: 15
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ollama-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: agentic-architect
spec:
  selector:
    app: ollama
  ports:
  - protocol: TCP
    port: 11434
    targetPort: 11434
---
# --- 3. ARIZE PHOENIX (Observability & Tracing) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: agentic-architect
spec:
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
      - name: phoenix
        image: arizephoenix/phoenix:latest
        ports:
        - containerPort: 6006 # Web UI
        - containerPort: 4317 # gRPC Collector
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: agentic-architect
spec:
  selector:
    app: phoenix
  ports:
  - name: ui
    port: 6006
  - name: grpc
    port: 4317
---
# --- 4. THE ARCHITECT (Core Agentic Application) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect
  namespace: agentic-architect
spec:
  selector:
    matchLabels:
      app: architect
  template:
    metadata:
      labels:
        app: architect
    spec:
      containers:
      - name: agentic-architect
        image: agentic-architect-local:latest
        workingDir: /app
        env:
        - name: ENV
          value: "production"
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: PHOENIX_COLLECTOR_ENDPOINT
          value: "http://phoenix:4317"
        # Security context for advanced debugging/tracing capabilities
        securityContext:
          capabilities:
            add: ["SYS_PTRACE"]
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: architect-service
  namespace: agentic-architect
spec:
  selector:
    app: architect
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
# --- 5. INGRESS CONTROLLER (Traefik Routing) ---
# Standard K3s/K3d Ingress using built-in Traefik controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: architect-ingress
  namespace: agentic-architect
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: thearchitect.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: architect-service
            port:
              number: 8080