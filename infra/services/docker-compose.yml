version: "3.8"

services:
  # EDGE PROXY: Traefik handles SSL (HTTPS) automatically via Let's Encrypt
  traefik:
    image: traefik:v2.10
    profiles: ["deploy"]
    container_name: traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=fabien.furfaro@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    restart: always

  # PHOENIX: Local Observability & Tracing for LLM Agents
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix_service
    ports:
      - "6006:6006" # Web UI Dashboard
      - "4317:4317" # OTLP gRPC collector
      - "4318:4318" # OTLP HTTP collector
    restart: always

  # OLLAMA: Local inference engine (pre-configured with gemma2:270m)
  ollama:
    build:
      context: .
      dockerfile: Ollama.Dockerfile
    container_name: ollama_service
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "show", "gemma3:270m"] # in Ollama.Dockerfile
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  # ARCHITECT SERVICE: The main agentic engine developed by Fabien Furfaro
  architect:
    build:
      context: ../../
      dockerfile: apps/architect/Dockerfile
    container_name: agentic_architect
    environment:
      - ENV=test
      - OLLAMA_URL=http://ollama:11434
      # Points to the Phoenix Docker service defined below
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:4317
      - PHOENIX_CLIENT_HEADERS=api_key=unused
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.architect.rule=Host(`thearchitect.dev`)"
      - "traefik.http.routers.architect.entrypoints=websecure"
      - "traefik.http.routers.architect.tls.certresolver=myresolver"
      # NiceGUI default port mapping
      - "traefik.http.services.architect.loadbalancer.server.port=8080"
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_healthy
      phoenix:
        condition: service_started
    restart: always

volumes:
  ollama_data:
